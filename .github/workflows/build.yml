name: Multi-Platform Build
on: [push, pull_request]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Keeps other builds running if one fails
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: snake-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: snake-windows
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: snake-mac-arm

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libpkgconf-dev libx11-dev libxi-dev libgl1-mesa-dev libxcursor-dev libxinerama-dev libxrandr-dev

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # --- THE MAGIC CACHING STEP ---
      # This saves your 'target' folder so you don't recompile Macroquad every time.
      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          # Path uses your exact project name "LocalGame" 
          # The * handles both extensionless (Mac/Linux) and .exe (Windows)
          path: target/${{ matrix.target }}/release/LocalGame*
          if-no-files-found: error